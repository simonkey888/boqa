services:
  boqa:
    build:
      context: .
      dockerfile: Dockerfile
    image: boqa:1.4.0-fixed
    restart: unless-stopped
    ports:
      - "80:7070"
    volumes:
      - /var/lib/boqa/output:/app/output
    environment:
      BOQA_API_KEY: ${BOQA_API_KEY:?BOQA_API_KEY must be set externally}
      BOQA_HMAC_SECRET: ${BOQA_HMAC_SECRET:?BOQA_HMAC_SECRET must be set externally}
      BOQA_BILLING_PIN: ${BOQA_BILLING_PIN:?BOQA_BILLING_PIN must be set externally}
      BOQA_AUTO_ANALYZE: "false"
