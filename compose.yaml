services:
  boqa:
    build:
      context: .
      dockerfile: Dockerfile
    image: boqa:1.4.0-fixed
    restart: unless-stopped
    ports:
      - "80:7070"
    volumes:
      - /var/lib/boqa/output:/app/output
    environment:
      BOQA_API_KEY: ${BOQA_API_KEY:?BOQA_API_KEY must be set externally}
      BOQA_HMAC_SECRET: ${BOQA_HMAC_SECRET:?BOQA_HMAC_SECRET must be set externally}
      BOQA_BILLING_PIN: ${BOQA_BILLING_PIN:?BOQA_BILLING_PIN must be set externally}
      BOQA_AUTO_ANALYZE: "false"
      BOQA_LAB_ENABLED: ${BOQA_LAB_ENABLED:-false}
      BOQA_LAB_IMAGE_DIGEST: ${BOQA_LAB_IMAGE_DIGEST:-}
    networks:
      - default
      - boqa_lab_internal

  boqa-lab-juice-shop:
    profiles: ["lab"]
    image: bkimminich/juice-shop@sha256:67b87bff95f5719f9a31ab2bcf48cacc30fcc30d4662c2047ca0c0b8b4b7ebae
    restart: "no"
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 128
    mem_limit: 512m
    cpus: 0.75
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
      - /juice-shop/data:size=64m,nosuid,nodev
      - /juice-shop/logs:size=16m,nosuid,nodev
    networks:
      - boqa_lab_internal
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  boqa-lab-control:
    profiles: ["lab"]
    image: boqa:1.4.0-fixed
    command: ["node", "qualification/labs/juice-shop-v1/control-server.js"]
    restart: "no"
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 64
    mem_limit: 96m
    cpus: 0.25
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
    networks:
      - boqa_lab_internal
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 12

networks:
  boqa_lab_internal:
    internal: true
