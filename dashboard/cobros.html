<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="referrer" content="no-referrer">
  <title>Acceso restringido · BOQA</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/private.css">
  <script src="/cobros.js" defer></script>
</head>
<body class="private-body">
  <main class="private-shell" id="main">
    <section id="gate" class="private-card" aria-labelledby="gate-title">
      <span class="brand">BOQA</span>
      <p class="private-eyebrow">Acceso restringido</p>
      <h1 id="gate-title">Verificación requerida</h1>
      <p>Ingresá el código autorizado para continuar.</p>
      <form id="access-form" autocomplete="off" novalidate>
        <label for="pin">Código de acceso</label>
        <input id="pin" name="pin" type="password" inputmode="numeric" maxlength="128" required autocomplete="off" aria-describedby="auth-error">
        <button type="submit">Continuar</button>
        <p id="auth-error" role="alert" aria-live="assertive"></p>
      </form>
    </section>

    <section id="private-root" class="private-content" aria-live="polite" hidden>
      <header class="private-header">
        <div>
          <span class="brand">BOQA</span>
          <p id="session-state">Sesión privada activa</p>
        </div>
        <button id="logout" type="button">Cerrar sesión</button>
      </header>
      <div id="private-view" class="private-card"></div>
    </section>
  </main>
</body>
</html>
