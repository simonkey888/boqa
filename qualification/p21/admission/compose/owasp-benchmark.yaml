services:
  laboratory:
    image: ${P21_BENCHMARK_IMAGE:?immutable local image required}
    user: "10001:10001"
    read_only: true
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    tmpfs: [/tmp:size=32m,noexec,nosuid]
    pids_limit: 96
    mem_limit: 512m
    cpus: 1.0
    networks: [isolated]
networks:
  isolated:
    internal: true
