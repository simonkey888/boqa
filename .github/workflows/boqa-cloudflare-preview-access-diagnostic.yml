name: BOQA Cloudflare Preview Access Diagnostic

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'deploy/boqa-cloudflare-preview-final'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Run redacted Cloudflare access diagnostic
        run: |
          set -Eeuo pipefail
          mkdir -p output/cloudflare-access-diagnostic
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo 'MISSING_ACCESS=CLOUDFLARE_API_TOKEN' | tee output/cloudflare-access-diagnostic/result.txt
            exit 78
          fi
          set +e
          npx --yes wrangler@4.112.0 whoami > output/cloudflare-access-diagnostic/whoami.txt 2> output/cloudflare-access-diagnostic/error.txt
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            rm -f output/cloudflare-access-diagnostic/error.txt
            echo 'CLOUDFLARE_ACCESS=PASS' | tee output/cloudflare-access-diagnostic/result.txt
            exit 0
          fi
          sed -E 's/(Bearer|token|Token|TOKEN|Authorization)[=: ]+[^ ]+/\1=[REDACTED]/g' output/cloudflare-access-diagnostic/error.txt > output/cloudflare-access-diagnostic/error-redacted.txt
          rm -f output/cloudflare-access-diagnostic/error.txt output/cloudflare-access-diagnostic/whoami.txt
          if grep -Eqi 'invalid.*token|authentication|authenticate|unauthorized|code.?10000|code.?9109' output/cloudflare-access-diagnostic/error-redacted.txt; then
            result='CLOUDFLARE_ACCESS=INVALID_OR_EXPIRED_TOKEN'
          elif grep -Eqi 'forbidden|permission|scope|not authorized|code.?10001' output/cloudflare-access-diagnostic/error-redacted.txt; then
            result='CLOUDFLARE_ACCESS=INSUFFICIENT_WORKERS_PERMISSIONS'
          elif grep -Eqi 'account.?id|multiple accounts|non-interactive.*account' output/cloudflare-access-diagnostic/error-redacted.txt; then
            result='CLOUDFLARE_ACCESS=ACCOUNT_RESOLUTION_FAILURE'
          elif grep -Eqi 'timeout|timed out|ECONN|ENOTFOUND|network|fetch failed|5[0-9][0-9]' output/cloudflare-access-diagnostic/error-redacted.txt; then
            result='CLOUDFLARE_ACCESS=TRANSIENT_NETWORK_OR_SERVICE_FAILURE'
          else
            result='CLOUDFLARE_ACCESS=UNCLASSIFIED_FAILURE'
          fi
          printf '%s\nEXIT_CODE=%s\n' "$result" "$status" | tee output/cloudflare-access-diagnostic/result.txt
          cat output/cloudflare-access-diagnostic/error-redacted.txt
          exit 78

      - name: Generate checksums
        if: always()
        run: |
          set -Eeuo pipefail
          cd output/cloudflare-access-diagnostic
          find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: boqa-cloudflare-preview-access-diagnostic
          path: output/cloudflare-access-diagnostic/
          if-no-files-found: error
          retention-days: 7
