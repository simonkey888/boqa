name: BOQA Backend Agent Compatibility Diagnostic V1

on:
  pull_request:
    branches:
      - deploy/boqa-backend-instance-agent-diagnostic-v1
    types:
      - labeled

permissions:
  contents: read

concurrency:
  group: boqa-backend-agent-compatibility-diagnostic-v1-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  diagnose-agent-compatibility-read-only:
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'authorized-backend-agent-compatibility-diagnostic' &&
      github.event.pull_request.number == 31 &&
      github.event.pull_request.draft == true &&
      github.event.pull_request.base.sha == '38f47c3dae02393db3e79ed90cefe01b84c5e2d3' &&
      github.event.pull_request.head.ref == 'deploy/boqa-backend-agent-compatibility-diagnostic-v1' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor == github.repository_owner &&
      contains(github.event.pull_request.body, 'BOQA_AUTONOMOUS_READONLY=AUTHORIZED') &&
      github.run_attempt == 1 &&
      github.run_number == 1
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
      DIAGNOSTIC_BASE_SHA: 38f47c3dae02393db3e79ed90cefe01b84c5e2d3
      REQUIRED_BRANCH: deploy/boqa-backend-agent-compatibility-diagnostic-v1
      EXPECTED_PR_NUMBER: '31'
      AUTH_LABEL: ${{ github.event.label.name }}
      EVIDENCE_DIR: output/backend-agent-compatibility-diagnostic-v1

    steps:
      - name: Checkout exact diagnostic head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Enforce exact authorization and two-file diff
        env:
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_ACTOR: ${{ github.actor }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -Eeuo pipefail
          test "$EVENT_PR_NUMBER" = "$EXPECTED_PR_NUMBER"
          test "$EVENT_HEAD_REF" = "$REQUIRED_BRANCH"
          test "$GITHUB_HEAD_REF" = "$REQUIRED_BRANCH"
          test "$EVENT_BASE_SHA" = "$DIAGNOSTIC_BASE_SHA"
          test "$HEAD_REPOSITORY" = "$GITHUB_REPOSITORY"
          test "$AUTH_LABEL" = authorized-backend-agent-compatibility-diagnostic
          test "$EVENT_ACTOR" = "$REPOSITORY_OWNER"
          test "$RUN_ATTEMPT" = 1
          test "$RUN_NUMBER" = 1
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          test -z "$(git status --porcelain)"
          git merge-base --is-ancestor "$DIAGNOSTIC_BASE_SHA" "$SOURCE_SHA"
          cat > /tmp/expected-files <<'EOF'
          .github/workflows/boqa-backend-agent-compatibility-diagnostic-v1.yml
          test/test-backend-agent-compatibility-diagnostic-v1.js
          EOF
          git diff --name-only "$DIAGNOSTIC_BASE_SHA" "$SOURCE_SHA" | sort > /tmp/actual-files
          diff -u /tmp/expected-files /tmp/actual-files

      - name: Validate compatibility diagnostic policy
        run: |
          set -Eeuo pipefail
          node test/test-backend-agent-compatibility-diagnostic-v1.js

      - name: Initialize sanitized evidence
        run: |
          set -Eeuo pipefail
          mkdir -p "$EVIDENCE_DIR"
          jq -n --arg source_sha "$SOURCE_SHA" --arg base_sha "$DIAGNOSTIC_BASE_SHA" '{
            source_sha:$source_sha,
            diagnostic_base_sha:$base_sha,
            instance_identity_matched:false,
            image_identity_resolved:false,
            available_plugins_read:false,
            observed_plugins_read:false,
            diagnostic_complete:false,
            command_api_used:false,
            new_command_created:false,
            command_canceled:false,
            production_changed:false,
            deploy_performed:false,
            restart_performed:false,
            rollback_executed:false
          }' > "$EVIDENCE_DIR/manifest.json"
          echo '{"compute_instance_get_used":true,"compute_image_get_used":true,"available_plugins_get_used":true,"plugin_list_used":true,"command_api_allowed":false}' > "$EVIDENCE_DIR/policy.json"

      - name: Install pinned OCI CLI before secret exposure
        run: |
          set -Eeuo pipefail
          python -m pip install --disable-pip-version-check --no-cache-dir 'oci-cli==3.89.2'
          test "$(oci --version)" = '3.89.2'
          oci --version > "$EVIDENCE_DIR/oci-cli-version.txt"

      - name: Configure isolated OCI profile
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_INSTANCE_OCID: ${{ secrets.OCI_INSTANCE_OCID }}
        run: |
          set -Eeuo pipefail
          set +x
          missing=()
          for name in OCI_TENANCY_OCID OCI_USER_OCID OCI_FINGERPRINT OCI_PRIVATE_KEY OCI_REGION OCI_COMPARTMENT_OCID OCI_INSTANCE_OCID; do
            [ -n "${!name:-}" ] || missing+=("$name")
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '%s\n' "${missing[@]}" | sed 's/^/MISSING_INPUT=/' > "$EVIDENCE_DIR/blocker.txt"
            exit 78
          fi
          install -d -m 700 "$HOME/.oci"
          printf '%s\n' "$OCI_PRIVATE_KEY" > "$HOME/.oci/key.raw"
          if openssl pkey -in "$HOME/.oci/key.raw" -noout >/dev/null 2>&1; then
            mv "$HOME/.oci/key.raw" "$HOME/.oci/key.pem"
          else
            base64 -d "$HOME/.oci/key.raw" > "$HOME/.oci/key.pem"
            rm -f "$HOME/.oci/key.raw"
            openssl pkey -in "$HOME/.oci/key.pem" -noout >/dev/null
          fi
          chmod 600 "$HOME/.oci/key.pem"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${OCI_USER_OCID}
          fingerprint=${OCI_FINGERPRINT}
          tenancy=${OCI_TENANCY_OCID}
          region=${OCI_REGION}
          key_file=${HOME}/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"
          printf '%s' "$OCI_COMPARTMENT_OCID" > /tmp/oci-compartment-id
          printf '%s' "$OCI_INSTANCE_OCID" > /tmp/oci-instance-id
          chmod 600 /tmp/oci-compartment-id /tmp/oci-instance-id
          echo '{"canonical_inputs_present":true,"values_recorded":false,"secrets_step_scoped":true}' > "$EVIDENCE_DIR/inputs.json"

      - name: Diagnose image compatibility and observed plugin gap
        run: |
          set -Eeuo pipefail
          set +x
          compartment_id=$(cat /tmp/oci-compartment-id)
          instance_id=$(cat /tmp/oci-instance-id)

          oci compute instance get --instance-id "$instance_id" --no-retry > /tmp/instance.json
          lifecycle=$(jq -r '.data."lifecycle-state" // empty' /tmp/instance.json)
          returned_id=$(jq -r '.data.id // empty' /tmp/instance.json)
          returned_compartment=$(jq -r '.data."compartment-id" // empty' /tmp/instance.json)
          image_id=$(jq -r '.data."image-id" // .data.imageId // empty' /tmp/instance.json)
          test "$lifecycle" = RUNNING
          test "$returned_id" = "$instance_id"
          test "$returned_compartment" = "$compartment_id"
          test -n "$image_id"
          image_id_sha=$(printf '%s' "$image_id" | sha256sum | awk '{print $1}')

          oci compute image get --image-id "$image_id" --no-retry > /tmp/image.json
          returned_image_id=$(jq -r '.data.id // empty' /tmp/image.json)
          test "$returned_image_id" = "$image_id"
          os_name=$(jq -r '.data."operating-system" // .data.operatingSystem // "UNKNOWN"' /tmp/image.json | tr -cd 'A-Za-z0-9 ._()/-' | cut -c1-64)
          os_version=$(jq -r '.data."operating-system-version" // .data.operatingSystemVersion // "UNKNOWN"' /tmp/image.json | tr -cd 'A-Za-z0-9 ._()/-' | cut -c1-64)
          image_created=$(jq -r '.data."time-created" // .data.timeCreated // empty' /tmp/image.json)
          image_created_present=false
          image_pre_oct_2020=false
          image_age_bucket=UNKNOWN
          if [ -n "$image_created" ]; then
            image_created_present=true
            created_epoch=$(date -u -d "$image_created" +%s 2>/dev/null || true)
            now_epoch=$(date -u +%s)
            cutoff_epoch=$(date -u -d '2020-10-01T00:00:00Z' +%s)
            if [[ "$created_epoch" =~ ^[0-9]+$ ]]; then
              [ "$created_epoch" -lt "$cutoff_epoch" ] && image_pre_oct_2020=true
              age=$((now_epoch-created_epoch))
              if [ "$age" -lt 31536000 ]; then image_age_bucket=LT_1Y
              elif [ "$age" -lt 94608000 ]; then image_age_bucket=LT_3Y
              elif [ "$age" -lt 157680000 ]; then image_age_bucket=LT_5Y
              else image_age_bucket=GE_5Y
              fi
            fi
          fi

          oci instance-agent available-plugins get \
            --compartment-id "$compartment_id" \
            --os-name "$os_name" \
            --os-version "$os_version" \
            --no-retry > /tmp/available.json
          available_total=$(jq '.data | length' /tmp/available.json)
          jq '[.data[] | select(((.name // "") | ascii_downcase | contains("run command")))]' /tmp/available.json > /tmp/available-run-command.json
          available_count=$(jq 'length' /tmp/available-run-command.json)
          platform_supported=false
          enabled_by_default=false
          if [ "$available_count" -eq 1 ]; then
            platform_supported=$(jq -r '.[0]."is-supported" // .[0].isSupported // false' /tmp/available-run-command.json)
            enabled_by_default=$(jq -r '.[0]."is-enabled-by-default" // .[0].isEnabledByDefault // false' /tmp/available-run-command.json)
          fi

          oci instance-agent plugin list \
            --compartment-id "$compartment_id" \
            --instanceagent-id "$instance_id" \
            --all --no-retry > /tmp/observed.json
          observed_total=$(jq '.data | length' /tmp/observed.json)
          observed_count=$(jq '[.data[] | select(((.name // "") | ascii_downcase | contains("run command")))] | length' /tmp/observed.json)

          classification=BLOCKED_COMPATIBILITY_UNKNOWN
          if [ "$available_count" -eq 0 ]; then
            classification=BLOCKED_PLATFORM_PLUGIN_NOT_LISTED
          elif [ "$available_count" -gt 1 ]; then
            classification=BLOCKED_AVAILABLE_PLUGIN_AMBIGUOUS
          elif [ "$platform_supported" != true ]; then
            classification=BLOCKED_PLATFORM_NOT_SUPPORTED
          elif [ "$observed_count" -gt 0 ]; then
            classification=PLUGIN_PRESENT_NOW
          elif [ "$image_pre_oct_2020" = true ]; then
            classification=LIKELY_AGENT_UPDATE_REQUIRED_LEGACY_IMAGE
          else
            classification=LIKELY_AGENT_INSTALLATION_OR_VERSION_GAP
          fi

          jq -n \
            --arg lifecycle_state "$lifecycle" \
            --arg image_id_sha256 "$image_id_sha" \
            --arg operating_system "$os_name" \
            --arg operating_system_version "$os_version" \
            --argjson image_created_present "$image_created_present" \
            --argjson image_pre_oct_2020 "$image_pre_oct_2020" \
            --arg image_age_bucket "$image_age_bucket" \
            --argjson available_plugin_total "$available_total" \
            --argjson run_command_available_match_count "$available_count" \
            --argjson run_command_platform_supported "$platform_supported" \
            --argjson run_command_enabled_by_default "$enabled_by_default" \
            --argjson observed_plugin_total "$observed_total" \
            --argjson run_command_observed_match_count "$observed_count" \
            --arg classification "$classification" \
            '{
              instance_lifecycle_state:$lifecycle_state,
              instance_identity_matched:true,
              compartment_identity_matched:true,
              image_identity_matched:true,
              image_id_sha256:$image_id_sha256,
              operating_system:$operating_system,
              operating_system_version:$operating_system_version,
              image_created_present:$image_created_present,
              image_pre_october_2020:$image_pre_oct_2020,
              image_age_bucket:$image_age_bucket,
              available_plugin_total:$available_plugin_total,
              run_command_available_match_count:$run_command_available_match_count,
              run_command_platform_supported:$run_command_platform_supported,
              run_command_enabled_by_default:$run_command_enabled_by_default,
              observed_plugin_total:$observed_plugin_total,
              run_command_observed_match_count:$run_command_observed_match_count,
              classification:$classification,
              identifiers_recorded:false,
              raw_image_recorded:false,
              raw_available_plugins_recorded:false,
              raw_observed_plugins_recorded:false
            }' > "$EVIDENCE_DIR/diagnostic.json"
          jq '.instance_identity_matched=true | .image_identity_resolved=true | .available_plugins_read=true | .observed_plugins_read=true | .diagnostic_complete=true' \
            "$EVIDENCE_DIR/manifest.json" > /tmp/manifest.json
          mv /tmp/manifest.json "$EVIDENCE_DIR/manifest.json"
          printf 'AGENT_COMPATIBILITY_DIAGNOSTIC=COMPLETE\nRUN_COMMAND_COMPATIBILITY_CLASSIFICATION=%s\nBACKEND_INSPECTED=false\nPRODUCTION_CHANGED=false\n' \
            "$classification" > "$EVIDENCE_DIR/result.txt"

      - name: Remove temporary credentials and raw responses
        if: always()
        run: |
          set +e
          rm -rf "$HOME/.oci"
          rm -f /tmp/expected-files /tmp/actual-files /tmp/oci-compartment-id /tmp/oci-instance-id
          rm -f /tmp/instance.json /tmp/image.json /tmp/available.json /tmp/available-run-command.json
          rm -f /tmp/observed.json /tmp/manifest.json

      - name: Verify sanitized evidence checksums
        if: always()
        run: |
          set -Eeuo pipefail
          cd "$EVIDENCE_DIR"
          find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Upload sanitized diagnostic evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: boqa-backend-agent-compatibility-diagnostic-v1-${{ github.event.pull_request.head.sha }}
          path: ${{ env.EVIDENCE_DIR }}/
          if-no-files-found: error
          retention-days: 14
