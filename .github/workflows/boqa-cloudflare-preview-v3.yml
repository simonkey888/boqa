name: BOQA Cloudflare Preview V3

on:
  push:
    branches: [deploy/boqa-cloudflare-preview-v3]
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: boqa-cloudflare-preview-v3
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      SOURCE_SHA: ede06de817d607e6717f6ea71f2e40aac68ea7a2
      WORKER_NAME: boqa
      PREVIEW_ALIAS: boqa-next
      PREVIEW_URL: https://boqa-next-boqa.simondalmasso44.workers.dev
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout exact release source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ede06de817d607e6717f6ea71f2e40aac68ea7a2
          persist-credentials: false

      - name: Verify source identity
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD)" = "${SOURCE_SHA}"
          test -z "$(git status --porcelain)"

      - name: Setup Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm

      - name: Initialize evidence
        run: |
          mkdir -p output/cloudflare-preview-v3
          printf '{"source_sha":"%s","preview_contract":"worker_before_backend","production_traffic_changed":false,"production_deployment_performed":false}\n' "${SOURCE_SHA}" > output/cloudflare-preview-v3/manifest.json

      - name: Verify Cloudflare access and configuration
        run: |
          set -Eeuo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}"
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}"
          npx --yes wrangler@4.112.0 whoami > output/cloudflare-preview-v3/whoami.txt
          npx --yes wrangler@4.112.0 secret list --name "${WORKER_NAME}" --format json > output/cloudflare-preview-v3/secret-names.json
          node <<'NODE'
          const fs = require('fs');
          const raw = JSON.parse(fs.readFileSync('output/cloudflare-preview-v3/secret-names.json', 'utf8'));
          const rows = Array.isArray(raw) ? raw : (raw.secrets || []);
          const names = new Set(rows.map((row) => typeof row === 'string' ? row : row.name).filter(Boolean));
          const required = ['BOQA_API_KEY', 'BOQA_HMAC_SECRET'];
          const missing = required.filter((name) => !names.has(name));
          fs.writeFileSync('output/cloudflare-preview-v3/secret-audit.json', JSON.stringify({ required, missing }, null, 2));
          if (missing.length) throw new Error(`MISSING_WORKER_SECRETS:${missing.join(',')}`);
          NODE

      - name: Record production rollback point
        run: |
          set -Eeuo pipefail
          npx --yes wrangler@4.112.0 deployments list --name "${WORKER_NAME}" --json > output/cloudflare-preview-v3/deployments-before.json
          npx --yes wrangler@4.112.0 versions list --name "${WORKER_NAME}" --json > output/cloudflare-preview-v3/versions-before.json

      - name: Validate exact source
        run: |
          set -Eeuo pipefail
          npm ci
          npm test
          node test/test-dashboard-smoke.js
          npx --yes wrangler@4.112.0 versions upload --dry-run --outdir output/cloudflare-preview-v3/dry-run --keep-vars

      - name: Upload preview version only
        run: |
          set -Eeuo pipefail
          npx --yes wrangler@4.112.0 versions upload \
            --preview-alias "${PREVIEW_ALIAS}" \
            --keep-vars \
            --tag "main-${SOURCE_SHA:0:12}" \
            --message "BOQA preview exact main ${SOURCE_SHA}; no production traffic" \
            2>&1 | tee output/cloudflare-preview-v3/version-upload.log
          npx --yes wrangler@4.112.0 versions list --name "${WORKER_NAME}" --json > output/cloudflare-preview-v3/versions-after.json
          npx --yes wrangler@4.112.0 deployments list --name "${WORKER_NAME}" --json > output/cloudflare-preview-v3/deployments-after.json

      - name: Prove production traffic unchanged
        run: |
          set -Eeuo pipefail
          cmp output/cloudflare-preview-v3/deployments-before.json output/cloudflare-preview-v3/deployments-after.json
          printf '{"production_deployments_unchanged":true}\n' > output/cloudflare-preview-v3/traffic-proof.json

      - name: Wait for preview
        run: |
          set -Eeuo pipefail
          for attempt in $(seq 1 30); do
            status=$(curl -sS -o /dev/null -w '%{http_code}' "${PREVIEW_URL}/" || true)
            [ "$status" = "200" ] && exit 0
            sleep 3
          done
          exit 1

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Audit public preview
        run: |
          set -Eeuo pipefail
          node <<'NODE'
          const fs = require('fs');
          const { chromium } = require('playwright');
          const base = process.env.PREVIEW_URL;
          const out = 'output/cloudflare-preview-v3';
          const sizes = [[1440,900,'desktop-1440'],[390,844,'mobile-390'],[360,800,'mobile-360']];

          function pathname(value) {
            try { return new URL(value).pathname; } catch (_) { return value; }
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const results = [];
            const failures = [];
            try {
              for (const [width,height,name] of sizes) {
                const page = await browser.newPage({ viewport: { width, height } });
                const pageErrors = [];
                const consoleErrors = [];
                const failedResponses = [];
                page.on('pageerror', (error) => pageErrors.push(String(error)));
                page.on('console', (message) => {
                  if (message.type() === 'error') consoleErrors.push(message.text());
                });
                page.on('response', (response) => {
                  if (response.status() >= 400) {
                    failedResponses.push({ path: pathname(response.url()), status: response.status() });
                  }
                });

                const response = await page.goto(`${base}/`, { waitUntil: 'networkidle', timeout: 30000 });
                await page.waitForFunction(() => document.querySelector('#overall-state')?.textContent !== 'LOADING', null, { timeout: 20000 });
                const state = await page.evaluate(() => {
                  const track = document.querySelector('.hunt-track');
                  return {
                    initialFocus: String(document.activeElement?.className || ''),
                    overall: document.querySelector('#overall-state')?.textContent,
                    hunter: document.querySelector('#hunter-state')?.textContent,
                    health: document.querySelector('#health-status')?.textContent,
                    huntVisible: Boolean(document.querySelector('#hunt-live')),
                    containerType: track ? getComputedStyle(track).containerType : null,
                    overflow: Math.max(0, document.documentElement.scrollWidth - document.documentElement.clientWidth),
                  };
                });

                await page.screenshot({ path: `${out}/${name}-initial.png`, fullPage: true });
                await page.keyboard.press('Tab');
                const skipFocusable = await page.evaluate(() => document.activeElement?.classList.contains('skip-link') === true);

                const legacyHunter404 = failedResponses.some((item) => item.path === '/api/hunter/status' && item.status === 404);
                const unexpectedFailedResponses = failedResponses.filter((item) => !(item.path === '/api/hunter/status' && item.status === 404));
                const unexpectedConsoleErrors = consoleErrors.filter((message) => {
                  return !(legacyHunter404 && message.includes('Failed to load resource'));
                });
                const compatibleRuntime = state.overall === 'FRESH' && state.hunter === 'ACTIVE' && state.health === 'ok';
                const legacyRuntime = state.overall === 'DEGRADED' && state.hunter === 'N/D' && state.health === 'ok' && legacyHunter404;
                const runtimeMode = compatibleRuntime ? 'compatible_backend' : (legacyRuntime ? 'legacy_backend_expected' : 'invalid');

                const result = {
                  name,
                  width,
                  height,
                  http: response?.status() || null,
                  ...state,
                  skipFocusable,
                  runtimeMode,
                  pageErrors,
                  consoleErrors,
                  failedResponses,
                  unexpectedConsoleErrors,
                  unexpectedFailedResponses,
                };
                results.push(result);

                if (result.http !== 200 || runtimeMode === 'invalid') failures.push(`${name}:runtime_state`);
                if (!result.huntVisible || result.containerType !== 'inline-size') failures.push(`${name}:hunt_trace`);
                if (result.initialFocus.includes('skip-link') || !result.skipFocusable) failures.push(`${name}:focus`);
                if (result.overflow || pageErrors.length || unexpectedConsoleErrors.length || unexpectedFailedResponses.length) {
                  failures.push(`${name}:browser`);
                }
                await page.close();
              }
            } finally {
              await browser.close();
            }
            fs.writeFileSync(`${out}/browser-preview-evidence.json`, JSON.stringify({ source_sha: process.env.SOURCE_SHA, results, failures }, null, 2));
            if (failures.length) throw new Error(failures.join(','));
          })().catch((error) => { console.error(error); process.exit(1); });
          NODE

      - name: Verify public contracts
        run: |
          set -Eeuo pipefail
          node <<'NODE'
          const fs = require('fs');
          const base = process.env.PREVIEW_URL;
          const required = [['/',[200]],['/health',[200]],['/api/health',[200]],['/api/defensive/status',[200]],['/api/hunter/status',[200,404]]];
          (async () => {
            const rows = [];
            const failures = [];
            for (const [route,allowed] of required) {
              const response = await fetch(base + route, { cache: 'no-store' });
              rows.push({
                route,
                status: response.status,
                allowed,
                cache_control: response.headers.get('cache-control'),
                contract_mode: route === '/api/hunter/status' && response.status === 404 ? 'legacy_backend_expected' : 'compatible',
              });
              if (!allowed.includes(response.status)) failures.push(`${route}:${response.status}`);
            }
            const hunter = rows.find((row) => row.route === '/api/hunter/status');
            fs.writeFileSync('output/cloudflare-preview-v3/http-contracts.json', JSON.stringify({
              rows,
              backend_contract: hunter.status === 200 ? 'compatible' : 'legacy_pending_backend_deploy',
            }, null, 2));
            if (failures.length) throw new Error(failures.join(','));
          })().catch((error) => { console.error(error); process.exit(1); });
          NODE

      - name: Verify evidence checksums
        if: always()
        run: |
          cd output/cloudflare-preview-v3
          find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Upload preview evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: boqa-cloudflare-preview-v3-${{ env.SOURCE_SHA }}
          path: output/cloudflare-preview-v3/
          if-no-files-found: error
          retention-days: 14
