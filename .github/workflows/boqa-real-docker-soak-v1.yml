name: BOQA Real Docker Soak V1

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  soak:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      CI: true
      BOQA_AUTO_ANALYZE: false
      BOQA_ADMIN_EXECUTION_ENABLED: false
      BOQA_OTEL_ENABLED: false
      BOQA_INSTANCE_COUNT: 1
      BOQA_API_KEY: 'dummy-api-key'
      BOQA_HMAC_SECRET: 'dummy-hmac-secret'
      BOQA_BILLING_PIN: '123456'
      npm_config_cache: ${{ github.workspace }}/.npm-cache
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Reproducible Install
        run: npm ci
        
      - name: Real Docker Soak (12 Rounds)
        env:
          SOAK_MODE: full
        run: node scripts/soak-test.js
        
      - name: Upload Evidence Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boqa-real-docker-soak-${{ github.sha }}
          path: |
            output/soak/
            docs/boqa-real-docker-soak-v1.json
