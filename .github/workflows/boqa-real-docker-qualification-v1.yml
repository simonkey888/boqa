name: BOQA Real Docker Qualification Gate V1

on:
  pull_request:
    branches:
      - main
      - 'feat/**'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: boqa-qualification-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  qualification:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CI: 'true'
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      BOQA_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      BOQA_MERGE_SHA: ${{ github.sha }}
      SOAK_MODE: short
      SOAK_INTERVAL_MS: '1000'

    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: npm

      - name: Initialize workflow evidence
        run: node scripts/gate-status.js workflow STARTED

      - name: Reproducible install
        run: |
          set -Eeuo pipefail
          trap 'node scripts/gate-status.js npm_ci FAIL' ERR
          npm ci
          node scripts/gate-status.js npm_ci PASS

      - name: Syntax gate
        run: |
          set -Eeuo pipefail
          trap 'node scripts/gate-status.js syntax FAIL' ERR
          node --check server.js lib/*.js routes/*.js scripts/*.js agent.js
          node scripts/gate-status.js syntax PASS

      - name: Focused production-helper tests
        run: |
          set -Eeuo pipefail
          trap 'node scripts/gate-status.js focused_tests FAIL' ERR
          node test/test-local-lab-runtime.js
          node test/test-soak-qualification-helpers.js
          node test/test-public-private-boundary.js
          node test/test-defensive-private.js
          node scripts/gate-status.js focused_tests PASS

      - name: Full regression suite
        id: full_suite
        continue-on-error: true
        run: |
          set -Eeuo pipefail
          mkdir -p output/soak/workflow
          trap 'node scripts/gate-status.js full_suite FAIL' ERR
          npm run test 2>&1 | tee output/soak/workflow/full-suite.log
          node scripts/gate-status.js full_suite PASS

      - name: Diff integrity
        id: diff_integrity
        run: |
          set -Eeuo pipefail
          trap 'node scripts/gate-status.js diff_check FAIL' ERR
          git diff --check
          node scripts/gate-status.js diff_check PASS

      - name: Candidate image identity diagnostic
        id: candidate_identity
        continue-on-error: true
        run: |
          set -Eeuo pipefail
          mkdir -p output/soak/workflow
          trap 'node scripts/gate-status.js candidate_identity FAIL' ERR
          IMAGE=$(node -p "require('./qualification/labs/juice-shop-v1/manifest.json').image_reference")
          docker pull "$IMAGE" >output/soak/workflow/candidate-image-pull.log 2>&1
          docker image inspect "$IMAGE" >output/soak/workflow/candidate-image-inspect.json
          docker run --rm \
            --network none \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --entrypoint /nodejs/bin/node \
            "$IMAGE" \
            -e 'process.stdout.write(JSON.stringify({exec_path:process.execPath,node:process.version,uid:process.getuid(),gid:process.getgid(),path:process.env.PATH||null})+"\n")' \
            >output/soak/workflow/candidate-image-node-probe.json
          node <<'NODE'
          const fs = require('fs');
          const manifest = require('./qualification/labs/juice-shop-v1/manifest.json');
          const image = JSON.parse(fs.readFileSync('output/soak/workflow/candidate-image-inspect.json', 'utf8'))[0];
          const probe = JSON.parse(fs.readFileSync('output/soak/workflow/candidate-image-node-probe.json', 'utf8'));
          const digestOk = Array.isArray(image.RepoDigests)
            && image.RepoDigests.some((value) => value.endsWith(`@${manifest.image_manifest_digest}`));
          if (!digestOk) throw new Error('CANDIDATE_MANIFEST_DIGEST_MISMATCH');
          if (image.Id !== manifest.image_config_digest) throw new Error('CANDIDATE_CONFIG_DIGEST_MISMATCH');
          if (String(image.Config?.User || '') !== '65532') throw new Error(`CANDIDATE_IMAGE_USER_UNEXPECTED:${image.Config?.User || ''}`);
          if (probe.exec_path !== '/nodejs/bin/node') throw new Error(`CANDIDATE_NODE_PATH_UNEXPECTED:${probe.exec_path}`);
          if (probe.uid !== 65532) throw new Error(`CANDIDATE_NODE_UID_UNEXPECTED:${probe.uid}`);
          const summary = {
            image_reference: manifest.image_reference,
            manifest_digest: manifest.image_manifest_digest,
            config_digest: image.Id,
            configured_user: image.Config.User,
            configured_env: image.Config.Env || [],
            runtime_probe: probe,
            digest_verified: true,
            binary_verified: true,
          };
          fs.writeFileSync('output/soak/workflow/candidate-image-identity.json', `${JSON.stringify(summary, null, 2)}\n`, { flag: 'wx' });
          NODE
          node scripts/gate-status.js candidate_identity PASS

      - name: Candidate startup diagnostic
        id: candidate_startup
        continue-on-error: true
        env:
          BOQA_REPO_ROOT: ${{ github.workspace }}
          BOQA_EVIDENCE_DIR: ${{ github.workspace }}/output/soak/startup-diagnostic
          BOQA_ROUND_ID: startup-diagnostic
        run: |
          set -uo pipefail
          mkdir -p output/soak/workflow "$BOQA_EVIDENCE_DIR"
          PROJECT="boqa-startup-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          COMPOSE=(docker compose -f compose.lab.yaml -p "$PROJECT")
          "${COMPOSE[@]}" up -d candidate >output/soak/workflow/candidate-startup-command.log 2>&1
          UP_STATUS=$?
          CID=$("${COMPOSE[@]}" ps -q candidate 2>/dev/null || true)
          STATE=missing
          HEALTH=missing
          NODE_PROBE_STATUS=1
          if [ -n "$CID" ]; then
            for _ in $(seq 1 90); do
              STATE=$(docker inspect -f '{{.State.Status}}' "$CID" 2>/dev/null || echo missing)
              HEALTH=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$CID" 2>/dev/null || echo missing)
              [ "$HEALTH" = healthy ] && break
              [ "$HEALTH" = unhealthy ] && break
              [ "$STATE" = exited ] && break
              sleep 2
            done
            docker inspect "$CID" >output/soak/workflow/candidate-container-inspect.json 2>/dev/null || printf '[]\n' >output/soak/workflow/candidate-container-inspect.json
            docker exec "$CID" /nodejs/bin/node -e 'process.stdout.write(JSON.stringify({exec_path:process.execPath,node:process.version,uid:process.getuid(),gid:process.getgid(),path:process.env.PATH||null})+"\n")' >output/soak/workflow/candidate-container-node-probe.json 2>output/soak/workflow/candidate-container-node-probe.err
            NODE_PROBE_STATUS=$?
          else
            printf '[]\n' >output/soak/workflow/candidate-container-inspect.json
            printf 'null\n' >output/soak/workflow/candidate-container-node-probe.json
            printf 'container missing\n' >output/soak/workflow/candidate-container-node-probe.err
          fi
          "${COMPOSE[@]}" ps -a >output/soak/workflow/candidate-startup-ps.log 2>&1 || true
          "${COMPOSE[@]}" logs --no-color candidate >output/soak/workflow/candidate-startup.log 2>&1 || true
          if [ -n "$CID" ]; then
            docker inspect -f '{{json .State.Health}}' "$CID" >output/soak/workflow/candidate-startup-health.json 2>/dev/null || printf 'null\n' >output/soak/workflow/candidate-startup-health.json
          else
            printf 'null\n' >output/soak/workflow/candidate-startup-health.json
          fi
          printf '{"up_status":%s,"container_id":"%s","state":"%s","health":"%s","node_probe_status":%s}\n' "$UP_STATUS" "$CID" "$STATE" "$HEALTH" "$NODE_PROBE_STATUS" >output/soak/workflow/candidate-startup-status.json
          "${COMPOSE[@]}" down -v --remove-orphans --timeout 10 >>output/soak/workflow/candidate-startup-command.log 2>&1 || true
          if [ "$UP_STATUS" -ne 0 ] || [ "$STATE" != running ] || [ "$HEALTH" != healthy ] || [ "$NODE_PROBE_STATUS" -ne 0 ]; then
            node scripts/gate-status.js candidate_startup FAIL
            cat output/soak/workflow/candidate-startup-status.json
            cat output/soak/workflow/candidate-startup-health.json
            cat output/soak/workflow/candidate-container-node-probe.err
            cat output/soak/workflow/candidate-startup.log
            exit 1
          fi
          node scripts/gate-status.js candidate_startup PASS

      - name: Real isolated Docker qualification
        id: docker_qualification
        continue-on-error: true
        run: |
          set -Eeuo pipefail
          mkdir -p output/soak/workflow
          trap 'node scripts/gate-status.js docker_qualification FAIL' ERR
          node scripts/soak-test.js 2>&1 | tee output/soak/workflow/docker-qualification.log
          node scripts/gate-status.js docker_qualification PASS

      - name: Enforce final workflow gate
        if: always()
        run: |
          set -Eeuo pipefail
          if [ "${{ steps.full_suite.outcome }}" != "success" ] || [ "${{ steps.diff_integrity.outcome }}" != "success" ] || [ "${{ steps.candidate_identity.outcome }}" != "success" ] || [ "${{ steps.candidate_startup.outcome }}" != "success" ] || [ "${{ steps.docker_qualification.outcome }}" != "success" ]; then
            node scripts/gate-status.js workflow FAIL
            exit 1
          fi
          node scripts/gate-status.js workflow PASS

      - name: Upload qualification evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: boqa-real-docker-qualification-${{ github.event.pull_request.head.sha }}
          path: |
            output/soak/
            docs/boqa-real-docker-soak-v1.json
          if-no-files-found: warn
          retention-days: 14
