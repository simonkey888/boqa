name: BOQA Real Docker Qualification Gate V1

on:
  pull_request:
    branches:
      - main
      - 'feat/**'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: boqa-qualification-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  qualification:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CI: 'true'
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      BOQA_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      BOQA_MERGE_SHA: ${{ github.sha }}
      SOAK_MODE: short
      SOAK_INTERVAL_MS: '1000'

    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Setup Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: npm

      - name: Initialize workflow evidence
        run: node scripts/gate-status.js workflow STARTED

      - name: Reproducible install
        run: |
          set -Eeuo pipefail
          trap 'node scripts/gate-status.js npm_ci FAIL' ERR
          npm ci
          node scripts/gate-status.js npm_ci PASS

      - name: Syntax gate
        run: |
          set -Eeuo pipefail
          trap 'node scripts/gate-status.js syntax FAIL' ERR
          node --check server.js lib/*.js routes/*.js scripts/*.js agent.js
          node scripts/gate-status.js syntax PASS

      - name: Focused production-helper tests
        run: |
          set -Eeuo pipefail
          trap 'node scripts/gate-status.js focused_tests FAIL' ERR
          node test/test-local-lab-runtime.js
          node test/test-soak-qualification-helpers.js
          node test/test-public-private-boundary.js
          node test/test-defensive-private.js
          node scripts/gate-status.js focused_tests PASS

      - name: Full regression suite
        id: full_suite
        continue-on-error: true
        run: |
          set -Eeuo pipefail
          mkdir -p output/soak/workflow
          trap 'node scripts/gate-status.js full_suite FAIL' ERR
          npm run test 2>&1 | tee output/soak/workflow/full-suite.log
          node scripts/gate-status.js full_suite PASS

      - name: Diff integrity
        id: diff_integrity
        run: |
          set -Eeuo pipefail
          trap 'node scripts/gate-status.js diff_check FAIL' ERR
          git diff --check
          node scripts/gate-status.js diff_check PASS

      - name: Real isolated Docker qualification
        id: docker_qualification
        continue-on-error: true
        run: |
          set -Eeuo pipefail
          mkdir -p output/soak/workflow
          trap 'node scripts/gate-status.js docker_qualification FAIL' ERR
          node scripts/soak-test.js 2>&1 | tee output/soak/workflow/docker-qualification.log
          node scripts/gate-status.js docker_qualification PASS

      - name: Enforce final workflow gate
        if: always()
        run: |
          set -Eeuo pipefail
          if [ "${{ steps.full_suite.outcome }}" != "success" ] || [ "${{ steps.diff_integrity.outcome }}" != "success" ] || [ "${{ steps.docker_qualification.outcome }}" != "success" ]; then
            node scripts/gate-status.js workflow FAIL
            exit 1
          fi
          node scripts/gate-status.js workflow PASS

      - name: Upload qualification evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: boqa-real-docker-qualification-${{ github.event.pull_request.head.sha }}
          path: |
            output/soak/
            docs/boqa-real-docker-soak-v1.json
          if-no-files-found: warn
          retention-days: 14
