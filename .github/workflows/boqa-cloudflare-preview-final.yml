name: BOQA Cloudflare Preview Final

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: boqa-cloudflare-preview-final
  cancel-in-progress: false

jobs:
  preview:
    if: github.head_ref == 'deploy/boqa-cloudflare-preview-final'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CI: "true"
      SOURCE_SHA: ede06de817d607e6717f6ea71f2e40aac68ea7a2
      WORKER_NAME: boqa
      PREVIEW_ALIAS: boqa-next
      PREVIEW_URL: https://boqa-next-boqa.simondalmasso44.workers.dev
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout exact release source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ede06de817d607e6717f6ea71f2e40aac68ea7a2
          persist-credentials: false

      - name: Verify source identity
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD)" = "${SOURCE_SHA}"
          test -z "$(git status --porcelain)"
          test "$(node -p "require('./package-lock.json').lockfileVersion")" != "undefined"

      - name: Setup Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm

      - name: Initialize redacted evidence
        run: |
          set -Eeuo pipefail
          mkdir -p output/cloudflare-preview-final
          cat > output/cloudflare-preview-final/manifest.json <<EOF
          {
            "source_sha": "${SOURCE_SHA}",
            "worker": "${WORKER_NAME}",
            "preview_alias": "${PREVIEW_ALIAS}",
            "preview_url": "${PREVIEW_URL}",
            "production_traffic_changed": false,
            "production_deployment_performed": false,
            "rollback_executed": false
          }
          EOF

      - name: Verify Cloudflare access
        run: |
          set -Eeuo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "MISSING_ACCESS=CLOUDFLARE_API_TOKEN"
            exit 78
          fi
          npx --yes wrangler@4.112.0 whoami >/dev/null
          printf '{"cloudflare_access":"PASS","account_source":"wrangler.toml"}\n' > output/cloudflare-preview-final/access.json

      - name: Verify Worker secret names
        run: |
          set -Eeuo pipefail
          npx --yes wrangler@4.112.0 secret list --name "${WORKER_NAME}" --format json > output/cloudflare-preview-final/secret-names-raw.json
          node <<'NODE'
          const fs = require('fs');
          const path = 'output/cloudflare-preview-final/secret-names-raw.json';
          const raw = JSON.parse(fs.readFileSync(path, 'utf8'));
          const rows = Array.isArray(raw) ? raw : (raw.secrets || []);
          const names = new Set(rows.map((row) => typeof row === 'string' ? row : row.name).filter(Boolean));
          const required = ['BOQA_API_KEY', 'BOQA_HMAC_SECRET'];
          const missing = required.filter((name) => !names.has(name));
          const audit = {
            required,
            present: required.filter((name) => names.has(name)),
            missing,
            optional_dashboard_password_present: names.has('DASHBOARD_PASSWORD'),
            dashboard_password_consumed_by_current_worker: false
          };
          fs.writeFileSync('output/cloudflare-preview-final/secret-audit.json', JSON.stringify(audit, null, 2));
          fs.rmSync(path);
          if (missing.length) {
            missing.forEach((name) => console.error(`MISSING_SECRET=${name}`));
            process.exit(78);
          }
          NODE

      - name: Record production rollback point
        run: |
          set -Eeuo pipefail
          npx --yes wrangler@4.112.0 deployments list --name "${WORKER_NAME}" --json > output/cloudflare-preview-final/deployments-before.json
          npx --yes wrangler@4.112.0 versions list --name "${WORKER_NAME}" --json > output/cloudflare-preview-final/versions-before.json

      - name: Validate exact source
        run: |
          set -Eeuo pipefail
          npm ci
          npm test
          node test/test-dashboard-smoke.js
          npx --yes wrangler@4.112.0 versions upload --dry-run --outdir output/cloudflare-preview-final/dry-run --keep-vars

      - name: Upload preview version only
        run: |
          set -Eeuo pipefail
          npx --yes wrangler@4.112.0 versions upload \
            --preview-alias "${PREVIEW_ALIAS}" \
            --keep-vars \
            --tag "main-${SOURCE_SHA:0:12}" \
            --message "BOQA preview exact main ${SOURCE_SHA}; no production traffic" \
            2>&1 | tee output/cloudflare-preview-final/version-upload.log
          npx --yes wrangler@4.112.0 versions list --name "${WORKER_NAME}" --json > output/cloudflare-preview-final/versions-after.json
          npx --yes wrangler@4.112.0 deployments list --name "${WORKER_NAME}" --json > output/cloudflare-preview-final/deployments-after.json

      - name: Prove production traffic unchanged
        run: |
          set -Eeuo pipefail
          node <<'NODE'
          const fs = require('fs');
          const before = JSON.parse(fs.readFileSync('output/cloudflare-preview-final/deployments-before.json', 'utf8'));
          const after = JSON.parse(fs.readFileSync('output/cloudflare-preview-final/deployments-after.json', 'utf8'));
          const unchanged = JSON.stringify(before) === JSON.stringify(after);
          fs.writeFileSync('output/cloudflare-preview-final/traffic-proof.json', JSON.stringify({ production_deployments_unchanged: unchanged }, null, 2));
          if (!unchanged) throw new Error('PRODUCTION_DEPLOYMENT_CHANGED_DURING_PREVIEW');
          NODE

      - name: Wait for preview endpoint
        run: |
          set -Eeuo pipefail
          for attempt in $(seq 1 30); do
            status=$(curl -sS -o /dev/null -w '%{http_code}' "${PREVIEW_URL}/" || true)
            if [ "${status}" = "200" ]; then exit 0; fi
            sleep 3
          done
          echo "PREVIEW_ENDPOINT_UNAVAILABLE=${PREVIEW_URL}"
          exit 1

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Audit public preview and private boundary
        run: |
          set -Eeuo pipefail
          node <<'NODE'
          const fs = require('fs');
          const { chromium } = require('playwright');
          const base = process.env.PREVIEW_URL;
          const out = 'output/cloudflare-preview-final';
          const viewports = [
            { name: 'desktop-1440', width: 1440, height: 900 },
            { name: 'mobile-390', width: 390, height: 844 },
            { name: 'mobile-360', width: 360, height: 800 },
          ];
          const expectedPrivateConsole = /Failed to load resource: the server responded with a status of (401|403)/;
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const results = [];
            const failures = [];
            try {
              for (const viewport of viewports) {
                const context = await browser.newContext({ viewport: { width: viewport.width, height: viewport.height } });
                const page = await context.newPage();
                const pageErrors = [];
                const consoleErrors = [];
                page.on('pageerror', (error) => pageErrors.push(String(error)));
                page.on('console', (message) => { if (message.type() === 'error') consoleErrors.push(message.text()); });
                const response = await page.goto(`${base}/`, { waitUntil: 'networkidle', timeout: 30000 });
                await page.waitForFunction(() => document.getElementById('overall-state')?.textContent !== 'LOADING', null, { timeout: 20000 });
                const state = await page.evaluate(() => {
                  const track = document.querySelector('.hunt-track');
                  const trace = document.querySelector('#hunt-live');
                  return {
                    initialFocusClass: String(document.activeElement?.className || ''),
                    heroVisible: Boolean(document.querySelector('#hero-title')),
                    overallState: document.querySelector('#overall-state')?.textContent || null,
                    hunterState: document.querySelector('#hunter-state')?.textContent || null,
                    healthStatus: document.querySelector('#health-status')?.textContent || null,
                    healthRelease: document.querySelector('#health-release')?.textContent || null,
                    huntVisible: Boolean(trace),
                    huntMode: trace?.dataset.mode || null,
                    huntContainerType: track ? getComputedStyle(track).containerType : null,
                    horizontalOverflow: Math.max(0, document.documentElement.scrollWidth - document.documentElement.clientWidth),
                  };
                });
                await page.screenshot({ path: `${out}/${viewport.name}-initial-viewport.png`, fullPage: false });
                await page.screenshot({ path: `${out}/${viewport.name}-initial-full.png`, fullPage: true });
                await page.keyboard.press('Tab');
                const skipLinkFocusable = await page.evaluate(() => document.activeElement?.classList.contains('skip-link') === true);
                const result = { viewport, httpStatus: response?.status() || null, ...state, skipLinkFocusable, pageErrors, consoleErrors };
                results.push(result);
                const prefix = viewport.name;
                if (result.httpStatus !== 200) failures.push(`${prefix}:http_${result.httpStatus}`);
                if (!result.heroVisible || !result.huntVisible) failures.push(`${prefix}:content_not_visible`);
                if (result.initialFocusClass.includes('skip-link') || !result.skipLinkFocusable) failures.push(`${prefix}:focus`);
                if (result.huntContainerType !== 'inline-size') failures.push(`${prefix}:hunt_container_${result.huntContainerType}`);
                if (!['ready', 'running', 'starting'].includes(result.huntMode)) failures.push(`${prefix}:hunt_mode_${result.huntMode}`);
                if (result.overallState !== 'FRESH' || result.hunterState !== 'ACTIVE' || result.healthStatus !== 'ok') failures.push(`${prefix}:runtime_state`);
                if (result.horizontalOverflow !== 0 || pageErrors.length || consoleErrors.length) failures.push(`${prefix}:browser`);
                await context.close();
              }

              const privateContext = await browser.newContext({ viewport: { width: 390, height: 844 } });
              const privatePage = await privateContext.newPage();
              const privatePageErrors = [];
              const privateConsoleErrors = [];
              privatePage.on('pageerror', (error) => privatePageErrors.push(String(error)));
              privatePage.on('console', (message) => {
                if (message.type() === 'error' && !expectedPrivateConsole.test(message.text())) privateConsoleErrors.push(message.text());
              });
              const privateResponse = await privatePage.goto(`${base}/cobros`, { waitUntil: 'networkidle', timeout: 30000 });
              const privateText = await privatePage.locator('body').innerText();
              const privateRootHidden = await privatePage.locator('#private-root').isHidden();
              const sessionStatus = await privatePage.evaluate(() => fetch('/api/private/billing/session', { credentials: 'same-origin', cache: 'no-store' }).then((response) => response.status));
              const dataStatus = await privatePage.evaluate(() => fetch('/api/private/billing/data', { credentials: 'same-origin', cache: 'no-store' }).then((response) => response.status));
              await privatePage.screenshot({ path: `${out}/cobros-anonymous-mobile.png`, fullPage: true });
              const privateLeak = /Centro de Cobros|Movimientos|saldo|monto|ingreso/i.test(privateText);
              const privateResult = {
                httpStatus: privateResponse?.status() || null,
                privateRootHidden,
                sessionStatus,
                dataStatus,
                privateLeak,
                pageErrors: privatePageErrors,
                consoleErrors: privateConsoleErrors,
              };
              if (privateResult.httpStatus !== 200 || !privateRootHidden || sessionStatus !== 401 || dataStatus !== 401 || privateLeak || privatePageErrors.length || privateConsoleErrors.length) failures.push('private_boundary');
              await privateContext.close();

              fs.writeFileSync(`${out}/browser-preview-evidence.json`, JSON.stringify({ source_sha: process.env.SOURCE_SHA, preview_url: base, production_traffic_changed: false, results, private: privateResult, failures }, null, 2));
              if (failures.length) throw new Error(failures.join(','));
            } finally {
              await browser.close();
            }
          })().catch((error) => { console.error(error); process.exit(1); });
          NODE

      - name: Verify HTTP contracts
        run: |
          set -Eeuo pipefail
          node <<'NODE'
          const fs = require('fs');
          const base = process.env.PREVIEW_URL;
          const expected = new Map([
            ['/', 200],
            ['/health', 200],
            ['/api/health', 200],
            ['/api/hunter/status', 200],
            ['/api/defensive/status', 200],
            ['/api/private/billing/session', 401],
            ['/api/private/billing/data', 401],
          ]);
          (async () => {
            const records = [];
            const failures = [];
            for (const [route, expectedStatus] of expected) {
              try {
                const response = await fetch(base + route, { redirect: 'manual', cache: 'no-store' });
                records.push({ route, status: response.status, expected_status: expectedStatus, cache_control: response.headers.get('cache-control'), content_type: response.headers.get('content-type') });
                if (response.status !== expectedStatus) failures.push(`${route}:${response.status}`);
              } catch (error) {
                records.push({ route, error: error.name });
                failures.push(`${route}:${error.name}`);
              }
            }
            fs.writeFileSync('output/cloudflare-preview-final/http-contracts.json', JSON.stringify(records, null, 2));
            if (failures.length) throw new Error(`HTTP_CONTRACT_FAILURE:${failures.join(',')}`);
          })().catch((error) => { console.error(error); process.exit(1); });
          NODE

      - name: Verify evidence checksums
        if: always()
        run: |
          set -Eeuo pipefail
          cd output/cloudflare-preview-final
          find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Upload redacted preview evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: boqa-cloudflare-preview-final-${{ env.SOURCE_SHA }}
          path: output/cloudflare-preview-final/
          if-no-files-found: error
          retention-days: 14
