name: BOQA P2.1 external lab reality check

on:
  pull_request:
  workflow_dispatch:
    inputs:
      phase:
        description: Build/freeze runtime images or execute the already-frozen baseline
        required: true
        default: acquisition
        type: choice
        options:
          - acquisition
          - baseline

permissions:
  contents: read

concurrency:
  group: boqa-p21-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  BOQA_OTEL_ENABLED: "false"
  BOQA_AUTO_ANALYZE: "false"
  BOQA_ADMIN_EXECUTION_ENABLED: "false"
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

jobs:
  admission-and-plane-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout clean commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install locked dependencies
        run: npm ci --no-audit --fund=false
      - name: Run P1 and P2 regression gates
        run: |
          npm test
          npm run test:p2
      - name: Validate Docker execution-plane policy
        run: node test/test-p21a-docker-plane-policy.js
      - name: Acquisition phase - build fixed-version smoke image
        run: docker pull node:20.19.4-alpine3.21
      - name: Isolated runtime smoke
        run: bash qualification/p21/runners/docker-plane.sh
      - name: Validate repository policy
        run: |
          node scripts/validate-workflow-policy.js
          git diff --check
          git diff --exit-code -- package-lock.json
      - name: Scan changed files for secrets
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: node scripts/scan-changed-secrets.js "$BASE_SHA" HEAD
      - name: Upload non-sensitive plane evidence
        uses: actions/upload-artifact@v4
        with:
          name: boqa-p21-plane-${{ github.sha }}
          path: qualification/results/p21-plane-smoke.json
          if-no-files-found: error
          retention-days: 14

  acquisition-and-runtime-freeze:
    if: github.event_name == 'workflow_dispatch'
    needs: admission-and-plane-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout clean commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Acquisition phase - install locked dependencies
        run: npm ci --no-audit --fund=false
      - name: Acquire and verify pinned sources
        run: bash qualification/p21/runners/acquire-sources.sh "$RUNNER_TEMP/p21-sources"
      - name: Verify frozen corpus against upstream oracles
        run: |
          node qualification/p21/corpus/verify-upstream-corpus.js \
            "$RUNNER_TEMP/p21-sources/owasp-benchmark/BenchmarkJava-79b9bd6177e07991a9c11dc19e457c840e229931" \
            "$RUNNER_TEMP/p21-sources/owasp-nodegoat/NodeGoat-c5cb68a7084e4ae7dcc60e6a98768720a81841e8" \
            "$RUNNER_TEMP/p21-sources/owasp-juice-shop/juice-shop-c8c407d503ce9c8e6582b39b40db84db06989744" \
            "$RUNNER_TEMP/p21-upstream-verification.json"
      - name: Build and freeze immutable runtime image IDs
        run: bash qualification/p21/runners/materialize-runtime-images.sh "$RUNNER_TEMP/p21-sources" p21-runtime-digests.json
      - name: Upload runtime provenance only
        uses: actions/upload-artifact@v4
        with:
          name: boqa-p21-runtime-provenance-${{ github.sha }}
          path: p21-runtime-digests.json
          if-no-files-found: error
          retention-days: 14
      - name: Full external-lab campaign only after in-job runtime freeze
        if: inputs.phase == 'baseline'
        run: bash qualification/p21/runners/full-external-labs.sh
