name: BOQA Cloudflare Preview V2

on:
  push:
    branches:
      - deploy/boqa-cloudflare-preview-v2
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: boqa-cloudflare-preview-v2
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CI: "true"
      SOURCE_SHA: ede06de817d607e6717f6ea71f2e40aac68ea7a2
      WORKER_NAME: boqa
      PREVIEW_ALIAS: boqa-next
      PREVIEW_URL: https://boqa-next-boqa.simondalmasso44.workers.dev
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout exact main source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ede06de817d607e6717f6ea71f2e40aac68ea7a2
          persist-credentials: false

      - name: Verify exact source identity
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD)" = "${SOURCE_SHA}"
          test "$(git status --porcelain)" = ""

      - name: Setup Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
          cache: npm

      - name: Initialize redacted evidence
        run: |
          set -Eeuo pipefail
          mkdir -p output/cloudflare-preview-v2
          cat > output/cloudflare-preview-v2/manifest.json <<EOF
          {
            "source_sha": "${SOURCE_SHA}",
            "worker": "${WORKER_NAME}",
            "preview_alias": "${PREVIEW_ALIAS}",
            "production_traffic_changed": false,
            "production_deployment_performed": false,
            "rollback_executed": false
          }
          EOF

      - name: Require Cloudflare access
        run: |
          set -Eeuo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "MISSING_ACCESS=CLOUDFLARE_API_TOKEN"
            exit 78
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "MISSING_ACCESS=CLOUDFLARE_ACCOUNT_ID"
            exit 78
          fi
          npx --yes wrangler@4.112.0 whoami > output/cloudflare-preview-v2/whoami.txt

      - name: Verify Worker secret names
        run: |
          set -Eeuo pipefail
          npx --yes wrangler@4.112.0 secret list --name "${WORKER_NAME}" --format json > output/cloudflare-preview-v2/secret-names.json
          node <<'NODE'
          const fs = require('fs');
          const raw = JSON.parse(fs.readFileSync('output/cloudflare-preview-v2/secret-names.json', 'utf8'));
          const rows = Array.isArray(raw) ? raw : (raw.secrets || []);
          const names = new Set(rows.map((row) => typeof row === 'string' ? row : row.name).filter(Boolean));
          const required = ['BOQA_API_KEY', 'BOQA_HMAC_SECRET'];
          const missing = required.filter((name) => !names.has(name));
          fs.writeFileSync('output/cloudflare-preview-v2/secret-audit.json', JSON.stringify({ required, present: required.filter((name) => names.has(name)), missing }, null, 2));
          if (missing.length) {
            missing.forEach((name) => console.error(`MISSING_SECRET=${name}`));
            process.exit(78);
          }
          NODE

      - name: Record rollback point
        run: |
          set -Eeuo pipefail
          npx --yes wrangler@4.112.0 deployments list --name "${WORKER_NAME}" --json > output/cloudflare-preview-v2/deployments-before.json
          npx --yes wrangler@4.112.0 versions list --name "${WORKER_NAME}" --json > output/cloudflare-preview-v2/versions-before.json

      - name: Install and validate source
        run: |
          set -Eeuo pipefail
          npm ci
          npm test
          node test/test-dashboard-smoke.js
          npx --yes wrangler@4.112.0 versions upload --dry-run --outdir output/cloudflare-preview-v2/dry-run --keep-vars

      - name: Upload preview version only
        run: |
          set -Eeuo pipefail
          npx --yes wrangler@4.112.0 versions upload \
            --preview-alias "${PREVIEW_ALIAS}" \
            --keep-vars \
            --tag "main-${SOURCE_SHA:0:12}" \
            --message "BOQA preview exact main ${SOURCE_SHA}; zero production traffic" \
            2>&1 | tee output/cloudflare-preview-v2/version-upload.log
          npx --yes wrangler@4.112.0 versions list --name "${WORKER_NAME}" --json > output/cloudflare-preview-v2/versions-after.json
          npx --yes wrangler@4.112.0 deployments list --name "${WORKER_NAME}" --json > output/cloudflare-preview-v2/deployments-after.json

      - name: Prove production deployment unchanged
        run: |
          set -Eeuo pipefail
          node <<'NODE'
          const fs = require('fs');
          const before = JSON.parse(fs.readFileSync('output/cloudflare-preview-v2/deployments-before.json', 'utf8'));
          const after = JSON.parse(fs.readFileSync('output/cloudflare-preview-v2/deployments-after.json', 'utf8'));
          const canonical = (value) => JSON.stringify(value);
          const unchanged = canonical(before) === canonical(after);
          fs.writeFileSync('output/cloudflare-preview-v2/traffic-proof.json', JSON.stringify({ production_deployments_unchanged: unchanged }, null, 2));
          if (!unchanged) throw new Error('PRODUCTION_DEPLOYMENT_CHANGED_DURING_PREVIEW');
          NODE

      - name: Wait for preview endpoint
        run: |
          set -Eeuo pipefail
          for attempt in $(seq 1 30); do
            status=$(curl -sS -o /dev/null -w '%{http_code}' "${PREVIEW_URL}/" || true)
            if [ "${status}" = "200" ]; then exit 0; fi
            sleep 3
          done
          echo "PREVIEW_ENDPOINT_UNAVAILABLE=${PREVIEW_URL}"
          exit 1

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Audit preview desktop mobile and private boundary
        run: |
          set -Eeuo pipefail
          node <<'NODE'
          const fs = require('fs');
          const { chromium } = require('playwright');
          const base = process.env.PREVIEW_URL;
          const out = 'output/cloudflare-preview-v2';
          const viewports = [
            { name: 'desktop-1440', width: 1440, height: 900 },
            { name: 'mobile-390', width: 390, height: 844 },
            { name: 'mobile-360', width: 360, height: 800 },
          ];
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const results = [];
            try {
              for (const viewport of viewports) {
                const context = await browser.newContext({ viewport: { width: viewport.width, height: viewport.height } });
                const page = await context.newPage();
                const pageErrors = [];
                const consoleErrors = [];
                page.on('pageerror', (error) => pageErrors.push(String(error)));
                page.on('console', (message) => { if (message.type() === 'error') consoleErrors.push(message.text()); });
                const response = await page.goto(`${base}/`, { waitUntil: 'networkidle', timeout: 30000 });
                await page.waitForFunction(() => document.getElementById('overall-state')?.textContent !== 'LOADING', null, { timeout: 20000 });
                const state = await page.evaluate(() => {
                  const huntTrack = document.querySelector('.hunt-track');
                  return {
                    title: document.title,
                    initialFocusClass: document.activeElement?.className || '',
                    textLength: document.body.innerText.trim().length,
                    heroVisible: Boolean(document.querySelector('#hero-title')),
                    huntVisible: Boolean(document.querySelector('#hunt-live')),
                    huntContainerType: huntTrack ? getComputedStyle(huntTrack).containerType : null,
                    overallState: document.querySelector('#overall-state')?.textContent || null,
                    hunterState: document.querySelector('#hunter-state')?.textContent || null,
                    healthStatus: document.querySelector('#health-status')?.textContent || null,
                    horizontalOverflow: Math.max(0, document.documentElement.scrollWidth - document.documentElement.clientWidth),
                  };
                });
                await page.screenshot({ path: `${out}/${viewport.name}-initial.png`, fullPage: true });
                await page.keyboard.press('Tab');
                const skipLinkFocusable = await page.evaluate(() => document.activeElement?.classList.contains('skip-link') === true);
                results.push({ viewport, httpStatus: response ? response.status() : null, ...state, skipLinkFocusable, pageErrors, consoleErrors });
                await context.close();
              }

              const privatePage = await browser.newPage({ viewport: { width: 390, height: 844 } });
              const privateErrors = [];
              privatePage.on('pageerror', (error) => privateErrors.push(String(error)));
              const privateResponse = await privatePage.goto(`${base}/cobros`, { waitUntil: 'networkidle', timeout: 30000 });
              const privateText = await privatePage.locator('body').innerText();
              const privateDataStatus = await privatePage.evaluate(() => fetch('/api/private/billing/data', { credentials: 'same-origin', cache: 'no-store' }).then((response) => response.status));
              await privatePage.screenshot({ path: `${out}/cobros-anonymous-mobile.png`, fullPage: true });
              const privateLeak = /Centro de Cobros|Movimientos|saldo|monto|ingreso/i.test(privateText);

              const evidence = {
                source_sha: process.env.SOURCE_SHA,
                preview_url: base,
                production_traffic_changed: false,
                production_deployment_performed: false,
                viewports: results,
                private: {
                  http_status: privateResponse ? privateResponse.status() : null,
                  data_status: privateDataStatus,
                  leaked_private_labels: privateLeak,
                  page_errors: privateErrors,
                },
              };
              fs.writeFileSync(`${out}/browser-preview-evidence.json`, JSON.stringify(evidence, null, 2));

              const failures = [];
              for (const result of results) {
                const prefix = result.viewport.name;
                if (result.httpStatus !== 200) failures.push(`${prefix}:http_${result.httpStatus}`);
                if (!result.heroVisible || !result.huntVisible || result.textLength < 100) failures.push(`${prefix}:content_not_visible`);
                if (result.initialFocusClass.includes('skip-link')) failures.push(`${prefix}:skip_link_visible_on_initial_render`);
                if (result.huntContainerType !== 'inline-size') failures.push(`${prefix}:hunt_container_${result.huntContainerType}`);
                if (result.overallState !== 'FRESH') failures.push(`${prefix}:overall_${result.overallState}`);
                if (result.hunterState !== 'ACTIVE') failures.push(`${prefix}:hunter_${result.hunterState}`);
                if (result.healthStatus !== 'ok') failures.push(`${prefix}:health_${result.healthStatus}`);
                if (!result.skipLinkFocusable) failures.push(`${prefix}:skip_link_not_focusable`);
                if (result.horizontalOverflow !== 0) failures.push(`${prefix}:overflow_${result.horizontalOverflow}`);
                if (result.pageErrors.length) failures.push(`${prefix}:pageerror_${result.pageErrors.length}`);
                if (result.consoleErrors.length) failures.push(`${prefix}:console_${result.consoleErrors.length}`);
              }
              if ((privateResponse ? privateResponse.status() : null) !== 200) failures.push('private:http');
              if (privateDataStatus !== 401) failures.push(`private:data_${privateDataStatus}`);
              if (privateLeak) failures.push('private:label_leak');
              if (privateErrors.length) failures.push(`private:pageerror_${privateErrors.length}`);
              if (failures.length) {
                console.error(failures.join('\n'));
                process.exitCode = 1;
              }
            } finally {
              await browser.close();
            }
          })().catch((error) => { console.error(error); process.exit(1); });
          NODE

      - name: Verify HTTP contracts
        run: |
          set -Eeuo pipefail
          node <<'NODE'
          const fs = require('fs');
          const base = process.env.PREVIEW_URL;
          const expected = new Map([
            ['/', 200],
            ['/health', 200],
            ['/api/health', 200],
            ['/api/hunter/status', 200],
            ['/api/defensive/status', 200],
            ['/api/private/billing/data', 401],
          ]);
          (async () => {
            const records = [];
            const failures = [];
            for (const [path, expectedStatus] of expected) {
              try {
                const response = await fetch(base + path, { redirect: 'manual', cache: 'no-store' });
                records.push({ path, status: response.status, expected_status: expectedStatus, cache_control: response.headers.get('cache-control'), content_type: response.headers.get('content-type') });
                if (response.status !== expectedStatus) failures.push(`${path}:${response.status}`);
              } catch (error) {
                records.push({ path, error: error.name });
                failures.push(`${path}:${error.name}`);
              }
            }
            fs.writeFileSync('output/cloudflare-preview-v2/http-contracts.json', JSON.stringify(records, null, 2));
            if (failures.length) throw new Error(`HTTP_CONTRACT_FAILURE:${failures.join(',')}`);
          })().catch((error) => { console.error(error); process.exit(1); });
          NODE

      - name: Verify evidence checksums
        if: always()
        run: |
          set -Eeuo pipefail
          cd output/cloudflare-preview-v2
          find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Upload redacted preview evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: boqa-cloudflare-preview-v2-${{ env.SOURCE_SHA }}
          path: output/cloudflare-preview-v2/
          if-no-files-found: error
          retention-days: 14
