name: BOQA Cloudflare Access Diagnostic V1

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  cloudflare-access-diagnostic:
    if: github.head_ref == 'deploy/boqa-cloudflare-preview-v1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Diagnose Cloudflare access without exposing credentials
        run: |
          set -Eeuo pipefail
          mkdir -p output/cloudflare-access-diagnostic
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            printf '%s\n' 'MISSING_ACCESS=CLOUDFLARE_API_TOKEN' > output/cloudflare-access-diagnostic/result.txt
            printf '%s\n' 'CONFIGURE_AT=GitHub repository simonkey888/boqa -> Settings -> Secrets and variables -> Actions -> Repository secrets' >> output/cloudflare-access-diagnostic/result.txt
            exit 78
          fi
          set +e
          npx --yes wrangler@4.112.0 whoami > output/cloudflare-access-diagnostic/whoami.txt 2> output/cloudflare-access-diagnostic/error.txt
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            sed -E 's/(Bearer|token|Token|TOKEN)[=: ]+[^ ]+/\1=[REDACTED]/g' output/cloudflare-access-diagnostic/error.txt > output/cloudflare-access-diagnostic/error-redacted.txt
            rm -f output/cloudflare-access-diagnostic/error.txt
            if grep -Eqi 'account.?id|CLOUDFLARE_ACCOUNT_ID|multiple accounts|non-interactive.*account' output/cloudflare-access-diagnostic/error-redacted.txt; then
              printf '%s\n' 'MISSING_ACCESS=CLOUDFLARE_ACCOUNT_ID' > output/cloudflare-access-diagnostic/result.txt
              printf '%s\n' 'CONFIGURE_AT=GitHub repository simonkey888/boqa -> Settings -> Secrets and variables -> Actions -> Repository secrets' >> output/cloudflare-access-diagnostic/result.txt
            elif grep -Eqi 'authentication|authenticate|invalid.*token|unauthorized|forbidden|permission|code.?10000|code.?9109' output/cloudflare-access-diagnostic/error-redacted.txt; then
              printf '%s\n' 'MISSING_ACCESS=CLOUDFLARE_API_TOKEN_WITH_WORKERS_PERMISSIONS' > output/cloudflare-access-diagnostic/result.txt
              printf '%s\n' 'CONFIGURE_AT=Cloudflare Dashboard -> My Profile -> API Tokens; then save as GitHub repository secret CLOUDFLARE_API_TOKEN' >> output/cloudflare-access-diagnostic/result.txt
            else
              printf '%s\n' 'MISSING_ACCESS=CLOUDFLARE_API_ACCESS' > output/cloudflare-access-diagnostic/result.txt
              printf '%s\n' 'CONFIGURE_AT=Cloudflare Dashboard -> My Profile -> API Tokens; then save required access in GitHub Actions repository secrets' >> output/cloudflare-access-diagnostic/result.txt
            fi
            cat output/cloudflare-access-diagnostic/result.txt
            cat output/cloudflare-access-diagnostic/error-redacted.txt
            exit 78
          fi
          printf '%s\n' 'CLOUDFLARE_ACCESS=PASS' > output/cloudflare-access-diagnostic/result.txt

      - name: Generate checksums
        if: always()
        run: |
          set -Eeuo pipefail
          cd output/cloudflare-access-diagnostic
          find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: boqa-cloudflare-access-diagnostic
          path: output/cloudflare-access-diagnostic/
          if-no-files-found: error
          retention-days: 7
