name: BOQA Backend Read-only Inspection V1

on:
  pull_request:
    branches:
      - deploy/boqa-backend-preflight-v2
    types:
      - labeled

permissions:
  contents: read

concurrency:
  group: boqa-backend-readonly-inspection-v1-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: false

jobs:
  inspect-backend-read-only:
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'authorized-backend-readonly-inspection' &&
      github.event.pull_request.number == 28 &&
      github.event.pull_request.draft == true &&
      github.event.pull_request.base.sha == '335a76afc303b7411737a729bdff2a761ce67d39' &&
      github.event.pull_request.head.ref == 'deploy/boqa-backend-readonly-inspection-v1' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor == github.repository_owner &&
      vars.BOQA_BACKEND_INSPECTION_AUTHORIZED_SHA != '' &&
      vars.BOQA_BACKEND_INSPECTION_AUTHORIZED_SHA == github.event.pull_request.head.sha &&
      github.run_attempt == 1
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
      EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      STACK_BASE_SHA: 335a76afc303b7411737a729bdff2a761ce67d39
      REQUIRED_BRANCH: deploy/boqa-backend-readonly-inspection-v1
      EXPECTED_PR_NUMBER: '28'
      AUTH_LABEL: ${{ github.event.label.name }}
      AUTHORIZED_HEAD_SHA: ${{ vars.BOQA_BACKEND_INSPECTION_AUTHORIZED_SHA }}
      HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
      EVIDENCE_DIR: output/backend-readonly-inspection-v1

    steps:
      - name: Checkout exact authorized head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Initialize evidence and enforce immutable authorization
        env:
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          EVENT_ACTOR: ${{ github.actor }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$EVIDENCE_DIR"
          jq -n \
            --arg source_sha "$SOURCE_SHA" \
            --arg event_base_sha "$EVENT_BASE_SHA" \
            --arg stack_base_sha "$STACK_BASE_SHA" \
            '{
              source_sha:$source_sha,
              event_base_sha:$event_base_sha,
              stack_base_sha:$stack_base_sha,
              backend_read_only_intent:true,
              control_plane_write_required:true,
              command_created:false,
              terminal_state_observed:false,
              sanitized_output_recorded:false,
              production_changed:false,
              deploy_performed:false,
              restart_performed:false,
              rollback_executed:false
            }' > "$EVIDENCE_DIR/manifest.json"

          test "$EVENT_PR_NUMBER" = "$EXPECTED_PR_NUMBER"
          test "$EVENT_HEAD_REF" = "$REQUIRED_BRANCH"
          test "$GITHUB_HEAD_REF" = "$REQUIRED_BRANCH"
          test "$EVENT_BASE_SHA" = "$STACK_BASE_SHA"
          test "$HEAD_REPOSITORY" = "$GITHUB_REPOSITORY"
          test "$AUTH_LABEL" = authorized-backend-readonly-inspection
          test "$EVENT_ACTOR" = "$REPOSITORY_OWNER"
          test "$RUN_ATTEMPT" = 1
          test -n "$AUTHORIZED_HEAD_SHA"
          test "$AUTHORIZED_HEAD_SHA" = "$SOURCE_SHA"
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          test -z "$(git status --porcelain)"
          git merge-base --is-ancestor "$STACK_BASE_SHA" "$SOURCE_SHA"

          cat > /tmp/expected-files <<'EOF'
          .github/scripts/boqa-backend-readonly-inspection-v1.sh
          .github/workflows/boqa-backend-readonly-inspection-v1.yml
          test/test-backend-readonly-inspection-v1.js
          EOF
          git diff --name-only "$STACK_BASE_SHA" "$SOURCE_SHA" | sort > /tmp/actual-files
          diff -u /tmp/expected-files /tmp/actual-files

      - name: Validate fixed inspection script
        run: |
          set -Eeuo pipefail
          script=.github/scripts/boqa-backend-readonly-inspection-v1.sh
          bash -n "$script"
          bytes=$(wc -c < "$script" | tr -d ' ')
          test "$bytes" -le 4000
          test -z "$(grep -n $'\r' "$script" || true)"
          test "$(grep -Fc 'http://127.0.0.1/api/health' "$script")" = 1
          test "$(grep -Fc 'http://127.0.0.1/api/hunter/status' "$script")" = 1
          test -z "$(grep -Eo 'https?://[^[:space:]]+' "$script" | grep -v '^http://127\.0\.0\.1/' || true)"
          grep -Fq -- '--no-trunc' "$script"
          grep -Fq 'BLOCKED_INSPECT_INCOMPLETE' "$script"
          grep -Fq '"state_mutation_command_attempted":false' "$script"
          if grep -Eiq '(^|[;&|[:space:]])(rm|mv|cp|install|chmod|chown|mkdir|touch|truncate|tee|dd|kill|pkill|reboot|shutdown|systemctl|service|apt|yum|dnf)([;&|[:space:]]|$)' "$script"; then
            echo 'SCRIPT_POLICY=FORBIDDEN_HOST_MUTATION' > "$EVIDENCE_DIR/blocker.txt"
            exit 78
          fi
          if grep -Eiq 'docker[[:space:]]+(start|stop|restart|rm|rmi|pull|push|build|run|exec|update|rename|tag|network|volume|compose)' "$script"; then
            echo 'SCRIPT_POLICY=FORBIDDEN_DOCKER_MUTATION' > "$EVIDENCE_DIR/blocker.txt"
            exit 78
          fi
          script_sha=$(sha256sum "$script" | awk '{print $1}')
          printf '%s' "$script_sha" > "$EVIDENCE_DIR/script-sha256.txt"
          jq -n --argjson bytes "$bytes" --arg sha256 "$script_sha" \
            '{bash_syntax:true,bytes:$bytes,max_bytes:4000,sha256:$sha256,mutation_denylist_passed:true}' \
            > "$EVIDENCE_DIR/script-validation.json"

      - name: Install pinned OCI CLI before secret exposure
        run: |
          set -Eeuo pipefail
          python -m pip install --disable-pip-version-check --no-cache-dir 'oci-cli==3.89.2'
          test "$(oci --version)" = '3.89.2'
          oci --version > "$EVIDENCE_DIR/oci-cli-version.txt"

      - name: Configure isolated OCI profile and exact target
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          OCI_INSTANCE_OCID: ${{ secrets.OCI_INSTANCE_OCID }}
        run: |
          set -Eeuo pipefail
          set +x
          missing=()
          [ -n "${OCI_TENANCY_OCID:-}" ] || missing+=(OCI_TENANCY_OCID)
          [ -n "${OCI_USER_OCID:-}" ] || missing+=(OCI_USER_OCID)
          [ -n "${OCI_FINGERPRINT:-}" ] || missing+=(OCI_FINGERPRINT)
          [ -n "${OCI_PRIVATE_KEY:-}" ] || missing+=(OCI_PRIVATE_KEY)
          [ -n "${OCI_REGION:-}" ] || missing+=(OCI_REGION)
          [ -n "${OCI_COMPARTMENT_OCID:-}" ] || missing+=(OCI_COMPARTMENT_OCID)
          [ -n "${OCI_INSTANCE_OCID:-}" ] || missing+=(OCI_INSTANCE_OCID)
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '%s\n' "${missing[@]}" | sed 's/^/MISSING_INPUT=/' > "$EVIDENCE_DIR/blocker.txt"
            exit 78
          fi

          install -d -m 700 "$HOME/.oci"
          printf '%s\n' "$OCI_PRIVATE_KEY" > "$HOME/.oci/key.raw"
          if openssl pkey -in "$HOME/.oci/key.raw" -noout >/dev/null 2>&1; then
            mv "$HOME/.oci/key.raw" "$HOME/.oci/key.pem"
          else
            base64 -d "$HOME/.oci/key.raw" > "$HOME/.oci/key.pem" 2>/dev/null || {
              echo 'OCI_PRIVATE_KEY_FORMAT=INVALID' > "$EVIDENCE_DIR/blocker.txt"
              exit 78
            }
            rm -f "$HOME/.oci/key.raw"
            openssl pkey -in "$HOME/.oci/key.pem" -noout >/dev/null 2>&1 || {
              echo 'OCI_PRIVATE_KEY_FORMAT=INVALID_AFTER_DECODE' > "$EVIDENCE_DIR/blocker.txt"
              exit 78
            }
          fi
          chmod 600 "$HOME/.oci/key.pem"
          cat > "$HOME/.oci/config" <<EOF
          [DEFAULT]
          user=${OCI_USER_OCID}
          fingerprint=${OCI_FINGERPRINT}
          tenancy=${OCI_TENANCY_OCID}
          region=${OCI_REGION}
          key_file=${HOME}/.oci/key.pem
          EOF
          chmod 600 "$HOME/.oci/config"
          printf '%s' "$OCI_COMPARTMENT_OCID" > /tmp/oci-compartment-id
          printf '%s' "$OCI_INSTANCE_OCID" > /tmp/oci-instance-id
          chmod 600 /tmp/oci-compartment-id /tmp/oci-instance-id
          echo '{"canonical_inputs_present":true,"values_recorded":false,"secrets_step_scoped":true}' \
            > "$EVIDENCE_DIR/inputs.json"

      - name: Revalidate exact instance and reject duplicate source command
        run: |
          set -Eeuo pipefail
          set +x
          compartment_id=$(cat /tmp/oci-compartment-id)
          instance_id=$(cat /tmp/oci-instance-id)
          command_name="boqa-readonly-inspection-v1-${SOURCE_SHA}"

          oci compute instance get --instance-id "$instance_id" --no-retry > /tmp/instance.json
          lifecycle=$(jq -r '.data."lifecycle-state" // empty' /tmp/instance.json)
          returned_id=$(jq -r '.data.id // empty' /tmp/instance.json)
          returned_compartment=$(jq -r '.data."compartment-id" // empty' /tmp/instance.json)
          test "$lifecycle" = RUNNING
          test "$returned_id" = "$instance_id"
          test "$returned_compartment" = "$compartment_id"

          oci instance-agent command-execution list \
            --compartment-id "$compartment_id" \
            --instance-id "$instance_id" \
            --all --no-retry > /tmp/prior-executions.json
          prior_count=$(jq '.data | length' /tmp/prior-executions.json)

          oci instance-agent command list \
            --compartment-id "$compartment_id" \
            --all --no-retry > /tmp/prior-commands.json
          duplicate_count=$(jq --arg name "$command_name" '[.data[] | select(."display-name" == $name)] | length' /tmp/prior-commands.json)
          if [ "$duplicate_count" -ne 0 ]; then
            echo 'COMMAND_ALREADY_EXISTS_FOR_SOURCE_SHA' > "$EVIDENCE_DIR/blocker.txt"
            exit 78
          fi

          instance_hash=$(printf '%s' "$instance_id" | sha256sum | awk '{print $1}')
          jq -n \
            --arg lifecycle "$lifecycle" \
            --arg instance_hash "$instance_hash" \
            --argjson prior_count "$prior_count" \
            --argjson duplicate_count "$duplicate_count" \
            '{
              instance_resolved:true,
              lifecycle_state:$lifecycle,
              instance_id_sha256:$instance_hash,
              instance_identity_matched:true,
              compartment_identity_matched:true,
              prior_execution_count:$prior_count,
              duplicate_source_command_count:$duplicate_count,
              identifiers_recorded:false
            }' > "$EVIDENCE_DIR/control-plane.json"

      - name: Create one deterministic fixed backend-read-only command
        run: |
          set -Eeuo pipefail
          set +x
          script=.github/scripts/boqa-backend-readonly-inspection-v1.sh
          script_sha=$(cat "$EVIDENCE_DIR/script-sha256.txt")
          compartment_id=$(cat /tmp/oci-compartment-id)
          instance_id=$(cat /tmp/oci-instance-id)
          command_name="boqa-readonly-inspection-v1-${SOURCE_SHA}"

          jq -n --rawfile text "$script" --arg sha "$script_sha" \
            '{source:{sourceType:"TEXT",text:$text,textSha256:$sha},output:{outputType:"TEXT"}}' \
            > /tmp/content.json
          jq -n --arg instance_id "$instance_id" '{instanceId:$instance_id}' > /tmp/target.json

          set +e
          command_id=$(
            oci instance-agent command create \
              --compartment-id "$compartment_id" \
              --content file:///tmp/content.json \
              --target file:///tmp/target.json \
              --timeout-in-seconds 120 \
              --display-name "$command_name" \
              --no-retry \
              --query data.id \
              --raw-output 2>/tmp/create.err
          )
          create_status=$?
          set -e
          if [ "$create_status" -ne 0 ] || [ -z "$command_id" ]; then
            echo 'COMMAND_CREATE=FAILED_NO_RETRY' > "$EVIDENCE_DIR/blocker.txt"
            exit 78
          fi

          printf '%s' "$command_id" > /tmp/command-id
          chmod 600 /tmp/command-id
          command_hash=$(printf '%s' "$command_id" | sha256sum | awk '{print $1}')
          jq --arg command_hash "$command_hash" \
            '.command_created=true | .command_id_sha256=$command_hash' \
            "$EVIDENCE_DIR/manifest.json" > /tmp/manifest.json
          mv /tmp/manifest.json "$EVIDENCE_DIR/manifest.json"
          rm -f /tmp/content.json /tmp/target.json /tmp/create.err

      - name: Retrieve and validate sanitized terminal result
        run: |
          set -Eeuo pipefail
          set +x
          command_id=$(cat /tmp/command-id)
          instance_id=$(cat /tmp/oci-instance-id)
          state=''
          for _ in $(seq 1 36); do
            if oci instance-agent command-execution get \
              --command-id "$command_id" \
              --instance-id "$instance_id" \
              --no-retry > /tmp/execution.json 2>/dev/null; then
              state=$(jq -r '.data."lifecycle-state" // empty' /tmp/execution.json)
              case "$state" in
                SUCCEEDED|FAILED|TIMED_OUT|CANCELED) break ;;
              esac
            fi
            sleep 5
          done

          case "$state" in
            SUCCEEDED|FAILED|TIMED_OUT|CANCELED) ;;
            *)
              echo 'COMMAND_EXECUTION=NO_TERMINAL_STATE' > "$EVIDENCE_DIR/blocker.txt"
              exit 78
              ;;
          esac

          exit_code=$(jq -r '.data.content."exit-code" // -1' /tmp/execution.json)
          service_sha=$(jq -r '.data.content."text-sha256" // empty' /tmp/execution.json)
          jq -r '.data.content.text // "" | @base64' /tmp/execution.json > /tmp/inspection-output.b64
          base64 -d /tmp/inspection-output.b64 > /tmp/inspection-output.txt
          text_bytes=$(wc -c < /tmp/inspection-output.txt | tr -d ' ')
          local_sha=$(sha256sum /tmp/inspection-output.txt | awk '{print $1}')
          test "$text_bytes" -gt 0
          test "$text_bytes" -le 1024
          [[ "$service_sha" =~ ^[0-9a-f]{64}$ ]]
          test "$service_sha" = "$local_sha"

          jq -e '
            .v == 1 and
            (.class | IN("INSPECTED","BLOCKED_DOCKER_ACCESS","BLOCKED_CONTAINER_AMBIGUITY","BLOCKED_INSPECT_INCOMPLETE")) and
            (.docker | IN("NO","DIRECT","SUDO_READ_ONLY")) and
            .state_mutation_command_attempted == false and
            (.containers | type == "number" and . >= 0) and
            (.mounts | type == "number" and . >= 0) and
            (.rw_mounts | type == "number" and . >= 0) and
            (.output_mount | type == "boolean") and
            (.port_bindings | type == "number" and . >= 0) and
            (.rollback_count | type == "number" and . >= 0) and
            (.health_http | test("^[0-9]{3}$")) and
            (.health_json | type == "boolean") and
            (.release_sha == "missing" or (.release_sha | test("^[0-9a-fA-F]{40}$"))) and
            (.hunter_http | test("^[0-9]{3}$")) and
            (.hunter_json | type == "boolean") and
            (.log_lines | type == "number" and . >= 0 and . <= 200) and
            (.log_critical | type == "number" and . >= 0) and
            (.log_secret_terms | type == "number" and . >= 0)
          ' /tmp/inspection-output.txt > "$EVIDENCE_DIR/inspection.json"

          classification=$(jq -r '.class' "$EVIDENCE_DIR/inspection.json")
          jq -n \
            --arg lifecycle_state "$state" \
            --argjson exit_code "$exit_code" \
            --arg text_sha256 "$local_sha" \
            --argjson text_bytes "$text_bytes" \
            --arg classification "$classification" \
            '{
              lifecycle_state:$lifecycle_state,
              exit_code:$exit_code,
              text_sha256:$text_sha256,
              service_checksum_required:true,
              service_checksum_matched:true,
              text_bytes:$text_bytes,
              classification:$classification,
              raw_output_recorded:false
            }' > "$EVIDENCE_DIR/execution.json"

          jq '.terminal_state_observed=true | .sanitized_output_recorded=true' \
            "$EVIDENCE_DIR/manifest.json" > /tmp/manifest.json
          mv /tmp/manifest.json "$EVIDENCE_DIR/manifest.json"
          rm -f /tmp/execution.json /tmp/inspection-output.b64 /tmp/inspection-output.txt

      - name: Enforce inspection completeness without declaring deployability
        run: |
          set -Eeuo pipefail
          empty_sha=e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855
          test "$(jq -r '.lifecycle_state' "$EVIDENCE_DIR/execution.json")" = SUCCEEDED
          test "$(jq -r '.exit_code' "$EVIDENCE_DIR/execution.json")" = 0
          test "$(jq -r '.classification' "$EVIDENCE_DIR/execution.json")" = INSPECTED
          jq -e --arg empty_sha "$empty_sha" '
            .state_mutation_command_attempted == false and
            .containers == 1 and
            (.docker | IN("DIRECT","SUDO_READ_ONLY")) and
            (.image_ref_sha | test("^[0-9a-f]{64}$") and . != $empty_sha) and
            (.image_id_sha | test("^[0-9a-f]{64}$") and . != $empty_sha) and
            ((.rollback_count == 0 and .rollback_set_sha == "") or
             (.rollback_count > 0 and (.rollback_set_sha | test("^[0-9a-f]{64}$")))) and
            ((.hunter_json == true and (.hunter_keys_sha | test("^[0-9a-f]{64}$"))) or
             (.hunter_json == false and .hunter_keys_sha == ""))
          ' "$EVIDENCE_DIR/inspection.json" >/dev/null
          echo 'BACKEND_READONLY_INSPECTION=COMPLETE' > "$EVIDENCE_DIR/result.txt"
          echo 'BACKEND_DEPLOYABILITY=NOT_EVALUATED' >> "$EVIDENCE_DIR/result.txt"

      - name: Verify sanitized evidence checksums
        if: always()
        run: |
          set -Eeuo pipefail
          cd "$EVIDENCE_DIR"
          find . -type f ! -name SHA256SUMS -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
          sha256sum -c SHA256SUMS

      - name: Upload sanitized inspection evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: boqa-backend-readonly-inspection-v1-${{ github.event.pull_request.head.sha }}
          path: ${{ env.EVIDENCE_DIR }}/
          if-no-files-found: error
          retention-days: 14

      - name: Remove temporary credentials and identifiers
        if: always()
        run: |
          set +e
          rm -rf "$HOME/.oci"
          rm -f /tmp/expected-files /tmp/actual-files /tmp/oci-compartment-id /tmp/oci-instance-id
          rm -f /tmp/instance.json /tmp/prior-executions.json /tmp/prior-commands.json
          rm -f /tmp/content.json /tmp/target.json /tmp/create.err /tmp/command-id /tmp/manifest.json
          rm -f /tmp/execution.json /tmp/inspection-output.b64 /tmp/inspection-output.txt
